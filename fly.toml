app = "agent-assistant-dreaston"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data/projects.db"
  UPLOADS_DIR = "/data/uploads"
  PYTHONUNBUFFERED = "1"

[[mounts]]
  source = "agent_assistant_data"
  destination = "/data"
  processes = ["app"]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

version: '3.8'

services:
  project-agent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/data/projects.db
      - UPLOADS_DIR=/app/uploads
    container_name: project-agent-web
